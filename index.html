<style>
  :root{
    --bg:#ffffff; --ink:#2a2a2a; --ink-soft:#9a948c; --ink-faint:#c4beb6;
    --line:#ececec; --accent:#1a1a1a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;min-height:100%;background:var(--bg);color:var(--ink);
    font-family:'Apple SD Gothic Neo','Noto Sans KR',-apple-system,system-ui,sans-serif;
    overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
  .serif{font-family:'Nanum Myeongjo','Noto Serif KR',Georgia,serif;font-weight:400;}
  #app{max-width:460px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:130px;}

  .topbar{position:sticky;top:0;z-index:20;background:var(--bg);
    padding:26px 26px 8px;display:flex;align-items:center;justify-content:space-between;}
  .topbar .title{font-size:21px;letter-spacing:.5px;}
  .topbar .center-title{position:absolute;left:50%;transform:translateX(-50%);font-size:19px;}
  .icon-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    font-size:18px;color:var(--ink-soft);cursor:pointer;background:none;border:none;}
  .icon-btn:active{color:var(--ink);}

  .lock-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:40px 36px;text-align:center;}
  .brand{font-size:34px;letter-spacing:8px;margin-bottom:6px;}
  .brand-sub{font-size:13px;color:var(--ink-soft);letter-spacing:2px;margin-bottom:48px;}
  .field{width:100%;max-width:280px;text-align:left;margin-bottom:20px;}
  .field label{font-size:11px;color:var(--ink-soft);letter-spacing:1px;display:block;margin-bottom:8px;}
  .field input{width:100%;padding:10px 2px;border:none;border-bottom:1px solid var(--line);
    background:transparent;font-size:16px;color:var(--ink);outline:none;font-family:inherit;}
  .field input:focus{border-bottom-color:var(--ink);}
  .lock-msg{font-size:12px;color:#c0392b;height:16px;margin-bottom:6px;}
  .btn-main{width:100%;max-width:280px;padding:14px;margin-top:8px;border:1px solid var(--ink);
    background:var(--ink);color:#fff;font-size:14px;letter-spacing:2px;cursor:pointer;font-family:inherit;}
  .btn-main:active{opacity:.7;}
  .btn-ghost{width:100%;max-width:280px;padding:13px;margin-top:12px;border:none;background:none;
    color:var(--ink-soft);font-size:13px;cursor:pointer;letter-spacing:.5px;font-family:inherit;}
  .hint-users{font-size:11px;color:var(--ink-faint);margin-top:30px;letter-spacing:.5px;}

  /* 달력 */
  .cal-wrap{padding:6px 20px 0;}
  .cal-head{display:flex;align-items:center;justify-content:center;gap:24px;margin:6px 0 18px;}
  .cal-head .mlabel{font-size:18px;letter-spacing:1px;min-width:150px;text-align:center;}
  .cal-nav{background:none;border:none;font-size:20px;color:var(--ink-soft);cursor:pointer;padding:4px 10px;}
  .cal-nav:active{color:var(--ink);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .cal-dow{text-align:center;font-size:11px;color:var(--ink-faint);padding:6px 0;letter-spacing:.5px;}
  .cal-cell{aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;border-radius:50%;position:relative;font-size:14px;color:var(--ink);}
  .cal-cell.empty{cursor:default;}
  .cal-cell.other{color:var(--ink-faint);}
  .cal-cell.today{font-weight:700;}
  .cal-cell.sel{background:var(--ink);color:#fff;}
  .cal-cell.sun{color:#c98b86;}
  .cal-cell.sel.sun{color:#fff;}
  .cal-dot{width:4px;height:4px;border-radius:50%;background:var(--ink);position:absolute;bottom:7px;}
  .cal-cell.sel .cal-dot{background:#fff;}

  .day-divider{height:1px;background:var(--line);margin:20px 26px 6px;}
  .day-label{padding:14px 26px 4px;font-size:13px;color:var(--ink-soft);}

  .entry-row{display:flex;align-items:baseline;justify-content:space-between;
    padding:18px 26px;cursor:pointer;gap:16px;}
  .entry-row:active{background:#fafafa;}
  .entry-row .row-title{font-size:16px;color:var(--ink);flex:1;min-width:0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry-row .row-title.empty{color:var(--ink-faint);}
  .entry-row .row-meta{font-size:11px;color:var(--ink-faint);white-space:nowrap;display:flex;gap:7px;align-items:center;}
  .row-kind{font-size:10px;color:var(--ink-faint);}
  .row-sep{height:1px;background:var(--line);margin:0 26px;}

  .list-head{padding:8px 26px 20px;text-align:center;}
  .list-head .greeting{font-size:13px;color:var(--ink-soft);}
  .list-divider{height:1px;background:var(--line);margin:0 26px 6px;}

  .empty-day{text-align:center;padding:34px 30px;color:var(--ink-faint);font-size:13px;line-height:1.7;}
  .empty-state{text-align:center;padding:80px 30px;color:var(--ink-faint);}
  .empty-state .mk{font-size:30px;margin-bottom:14px;letter-spacing:6px;}
  .empty-state p{font-size:13px;line-height:1.8;margin:0;}

  .editor-screen{padding:8px 26px 30px;}
  .entry-date{font-size:13px;color:var(--ink-soft);margin-bottom:22px;}
  .editor-screen .title-input{width:100%;border:none;outline:none;background:transparent;
    font-size:22px;color:var(--ink);margin-bottom:18px;font-family:inherit;}

<script>
const LS_USERS='somUsers',LS_SESSION='somSession';
const loadUsers=()=>{try{return JSON.parse(localStorage.getItem(LS_USERS))||[];}catch(e){return[];}};
const saveUsers=u=>localStorage.setItem(LS_USERS,JSON.stringify(u));
const eKey=id=>'somEntries_'+id;
const loadEntries=id=>{try{return JSON.parse(localStorage.getItem(eKey(id)))||[];}catch(e){return[];}};

const saveSched=(id,l)=>localStorage.setItem(schedKey(id),JSON.stringify(l));
const simpleHash=s=>{let h=0;for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0;}return'h'+h.toString(36);};
const getSession=()=>{try{return JSON.parse(localStorage.getItem(LS_SESSION));}catch(e){return null;}};

const setAutoLogin=v=>localStorage.setItem('somAutoLogin',v?'1':'0');
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.remove('show');void t.offsetWidth;t.classList.add('show');}
const daysEn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const mons=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const dowKr=['일','월','화','수','목','금','토'];
function fmtFull(ts){const d=new Date(ts);let h=d.getHours();const ap=h<12?'AM':'PM';h=h%12||12;return `${daysEn[d.getDay()]}, ${mons[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} ${h}:${String(d.getMinutes()).padStart(2,'0')} ${ap}`;}
function dayKey(ts){const d=new Date(ts);return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}
function dayKeyYMD(y,m,d){return `${y}-${m}-${d}`;}
function timeOnly(ts){const d=new Date(ts);let h=d.getHours();const ap=h<12?'오전':'오후';h=h%12||12;return `${ap} ${h}:${String(d.getMinutes()).padStart(2,'0')}`;}
function firstLine(t){const l=(t||'').trim().split('\n')[0];return l||'';}
const esc=s=>(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* =========================================================
   음력 변환 (1900~2050, KASI 기준 데이터 내장)
   각 항목: 그 음력년도의 각 달이 큰달(30일)인지 작은달(29일)인지를
   비트로 표현 + 윤달 위치. 아래는 공개된 통상적 음력 변환 테이블 포맷.
   ========================================================= */
const LUNAR_INFO=[
0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
0x06ca0,0x0b550,0x15355,0x04da0,0x0a5d0,0x14573,0x052d0,0x0a9a8,0x0e950,0x06aa0,
0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b5a0,0x195a6,
0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x05ac0,0x0ab60,0x096d5,0x092e0,
0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,
0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,
0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,
0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,
0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0
];
function lunarYearDays(y){let sum=348;const info=LUNAR_INFO[y-1900];for(let i=0x8000;i>0x8;i>>=1){sum+=(info&i)?1:0;}return sum+leapDays(y);}
function leapMonth(y){return LUNAR_INFO[y-1900]&0xf;}
function leapDays(y){if(leapMonth(y)){return (LUNAR_INFO[y-1900]&0x10000)?30:29;}return 0;}
function monthDays(y,m){return (LUNAR_INFO[y-1900]&(0x10000>>m))?30:29;}
const LUNAR_BASE=new Date(1900,0,31).getTime();
function solarToLunar(date){
  const y0=date.getFullYear();
  if(y0<1900||y0>2049)return null;
  let offset=Math.floor((date.getTime()-LUNAR_BASE)/86400000);
  let temp=0,y=1900,m,leap=0,isLeap=false;
  for(;y<2050&&offset>0;y++){temp=lunarYearDays(y);offset-=temp;}
  if(offset<0){offset+=temp;y--;}
  let isLeapMonth=false;
  leap=leapMonth(y);
  for(m=1;m<13&&offset>0;m++){
    if(leap>0&&m===(leap+1)&&!isLeapMonth){
      --m;isLeapMonth=true;temp=leapDays(y);
    } else {
      temp=monthDays(y,m);
    }
    if(isLeapMonth&&m===(leap+1))isLeapMonth=false;
    offset-=temp;
  }
  if(offset===0&&leap>0&&m===leap+1){
    if(isLeapMonth){isLeapMonth=false;}else{isLeapMonth=true;--m;}
  }
  if(offset<0){offset+=temp;--m;}
  return {year:y,month:m,day:offset+1,isLeap:isLeapMonth};
}
function lunarLabel(date){
  const l=solarToLunar(date);
  if(!l)return'';
  return `음 ${l.month}.${String(l.day).padStart(2,'0')}${l.isLeap?'(윤)':''}`;
}

/* ---------- 사진 압축 ---------- */
function compressImage(file,maxDim=900,quality=0.7){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
        else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror=reject;
      img.src=reader.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

  const doLogin=(id,pw)=>{

function todaysSchedules(s){
  const list=loadSched(s.userId);
  const todayKey=dayKey(Date.now());
  return list.filter(sc=>occursOn(sc,todayKey));
}
function occursOn(sc,k){
  const [y,m,d]=k.split('-').map(Number);
  if(!sc.repeat||sc.repeat==='none'){
    return dayKey(sc.date)===k;
  }
  const startDate=new Date(sc.date);
  const target=new Date(y,m,d);
  if(target<new Date(startDate.getFullYear(),startDate.getMonth(),startDate.getDate()))return false;
  if(sc.repeat==='weekly')return target.getDay()===startDate.getDay();
  if(sc.repeat==='monthly')return target.getDate()===startDate.getDate();
  if(sc.repeat==='yearly')return target.getMonth()===startDate.getMonth()&&target.getDate()===startDate.getDate();
  return false;
}

function renderCalendar(){
  const s=getSession();
  const entries=loadEntries(s.userId);
  const scheds=loadSched(s.userId);
  const counts={};entries.forEach(e=>{const k=dayKey(e.createdAt);counts[k]=(counts[k]||0)+1;});
  const schedDays=new Set();
  const y=state.calYear,m=state.calMonth;
  const daysInMonth=new Date(y,m+1,0).getDate();
  for(let d=1;d<=daysInMonth;d++){
    const k=dayKeyYMD(y,m,d);
    if(scheds.some(sc=>occursOn(sc,k)))schedDays.add(k);
  }
  const first=new Date(y,m,1);const startDow=first.getDay();
  const todayK=dayKey(Date.now());
  let cells='';
  for(let i=0;i<startDow;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const k=dayKeyYMD(y,m,d);const dow=new Date(y,m,d).getDay();
    const cls=['cal-cell'];
    if(dow===0)cls.push('sun');
    if(k===todayK)cls.push('today');
    if(k===state.selDayKey)cls.push('sel');
    let dots='';
    if(counts[k]||schedDays.has(k)){
      dots=`<span class="dual-dot">${counts[k]?'<span class="cal-dot"></span>':''}${schedDays.has(k)?'<span class="cal-dot sched-dot"></span>':''}</span>`;
    }
    cells+=`<div class="${cls.join(' ')}" data-k="${k}">${d}${dots}</div>`;
  }
  const body=document.getElementById('mainBody');
  body.innerHTML=`<div class="cal-wrap">
    <div class="cal-head">
      <button class="cal-nav" id="prevM">‹</button>
      <span class="mlabel serif">${y}년 ${m+1}월</span>
      <button class="cal-nav" id="nextM">›</button>
    </div>
    <div class="cal-grid">${dowKr.map((d,i)=>`<div class="cal-dow" style="${i===0?'color:#c98b86':''}">${d}</div>`).join('')}${cells}</div>
  </div>
  <div class="day-divider"></div>
  <div id="dayEntries"></div>`;
  document.getElementById('prevM').onclick=()=>{state.calMonth--;if(state.calMonth<0){state.calMonth=11;state.calYear--;}renderCalendar();};
  document.getElementById('nextM').onclick=()=>{state.calMonth++;if(state.calMonth>11){state.calMonth=0;state.calYear++;}renderCalendar();};
  body.querySelectorAll('.cal-cell[data-k]').forEach(c=>c.onclick=()=>{state.selDayKey=c.dataset.k;renderCalendar();});
  renderDayEntries();
}

/* =========================================================
   글쓰기 (일기/메모 공용) — 자동저장 + 사진첨부
   ========================================================= */
function renderEditor(){
  const s=getSession();
  const editing = state.editingEntry;
  const isMemo = editing ? editing.kind==='memo' : (state._draftKind==='memo');
  let kind=isMemo?'memo':'diary';
  let loc=editing ? (editing.loc||null) : state.pendingLoc;
  let locStatus=loc?'ok':'idle';
  let photos=editing ? (editing.photos||[]).slice() : (state.draftPhotos||[]);
  state.pendingLoc=loc; state.draftPhotos=photos;

  // 임시저장 복원 (새 글 작성 중이었고, 수정모드가 아닐 때만)
  let restoredTitle=editing?(editing.title||''):'';
  let restoredText=editing?(editing.text||''):'';
  if(!editing){
    const draft=loadDraft(s.userId);
    if(draft&&!draft.editingId&&(draft.title||draft.text)){
      restoredTitle=draft.title;restoredText=draft.text;
      kind=draft.kind||kind;loc=draft.loc||loc;photos=draft.photos||photos;
      state.pendingLoc=loc;state.draftPhotos=photos;
    }
  }
  state._draftKind=kind;

  app.innerHTML=`<div class="topbar"><div class="back-row"><button class="icon-btn" id="back">‹</button></div></div>
    <div class="editor-screen">
      <div class="entry-date serif">${fmtFull(Date.now())}</div>
      <div class="kind-toggle">
        <button data-k="diary" class="${kind==='diary'?'active':''} serif">일기</button>
        <button data-k="memo" class="${kind==='memo'?'active':''} serif">메모</button>
      </div>
      <input class="title-input serif" id="titleInput" placeholder="제목" value="${esc(restoredTitle)}">
      <textarea id="textArea" placeholder="당신의 이야기를 들려주세요...">${esc(restoredText)}</textarea>
      <div class="photo-strip" id="photoStrip"></div>
      <input type="file" id="photoInput" accept="image/*" multiple style="display:none">
      <div class="loc-note" id="locNote"></div>
    </div>`;

  dirtyEditor=false;

  document.getElementById('back').onclick=()=>guardLeave(()=>{
    dirtyEditor=false;clearDraft(s.userId);state.screen='main';render();
  });

  const note=document.getElementById('locNote');
  function locNoteUpdate(){
    if(kind==='memo'){note.style.display='none';return;}
    note.style.display='flex';
    if(locStatus==='ok'&&loc){
      note.classList.add('active');
      note.innerHTML=`◦ 이 위치가 함께 기록됩니다 (${loc.lat.toFixed(4)}, ${loc.lng.toFixed(4)})`;
    } else if(locStatus==='denied'){
      note.classList.remove('active');
      note.innerHTML=`◦ 위치를 가져오지 못했어요 <span id="retryLoc" style="text-decoration:underline;cursor:pointer;color:var(--ink);">다시 시도</span>`;
      const retry=document.getElementById('retryLoc');
      if(retry)retry.onclick=()=>{locStatus='idle';locNoteUpdate();requestLocation();};
    } else {
      note.classList.remove('active');
      note.textContent='위치 정보를 가져오는 중…';
    }
  }
  function requestLocation(){
    if(!('geolocation'in navigator)||!(location.protocol==='https:'||location.hostname==='localhost')){
      locStatus='denied';locNoteUpdate();return;
    }
    // 1차: 와이파이/통신사 기반 위치 (빠르고 실내에서도 잘 잡힘)
    navigator.geolocation.getCurrentPosition(
      p=>{loc={lat:p.coords.latitude,lng:p.coords.longitude};state.pendingLoc=loc;locStatus='ok';locNoteUpdate();},
      ()=>{
        // 2차: 정밀 GPS로 재시도 (대기시간 더 길게)
        navigator.geolocation.getCurrentPosition(
          p=>{loc={lat:p.coords.latitude,lng:p.coords.longitude};state.pendingLoc=loc;locStatus='ok';locNoteUpdate();},
          ()=>{locStatus='denied';locNoteUpdate();},
          {timeout:15000,enableHighAccuracy:true,maximumAge:0}
        );
      },
      {timeout:6000,enableHighAccuracy:false,maximumAge:60000}
    );
  }

  document.querySelectorAll('.kind-toggle button').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.kind-toggle button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');kind=b.dataset.k;state._draftKind=kind;
    locNoteUpdate();
    if(kind==='diary'&&!loc&&locStatus!=='ok'){requestLocation();}
  });

  locNoteUpdate();
  if(kind==='diary'&&!loc){
    requestLocation();
  }

  function renderPhotoStrip(){
    const strip=document.getElementById('photoStrip');
    strip.innerHTML=photos.map((p,i)=>`<div class="photo-thumb"><img src="${p}"><div class="rm" data-i="${i}">✕</div></div>`).join('')
      +`<button class="photo-add" id="addPhotoBtn">＋</button>`;
    strip.querySelectorAll('.rm').forEach(r=>r.onclick=()=>{photos.splice(Number(r.dataset.i),1);state.draftPhotos=photos;dirtyEditor=true;renderPhotoStrip();});
    document.getElementById('addPhotoBtn').onclick=()=>document.getElementById('photoInput').click();
  }
  renderPhotoStrip();
  document.getElementById('photoInput').onchange=async(ev)=>{
    const files=Array.from(ev.target.files||[]);
    for(const f of files){
      if(photos.length>=6){showToast('사진은 최대 6장까지 첨부할 수 있어요');break;}
      try{
        const compressed=await compressImage(f);
        photos.push(compressed);state.draftPhotos=photos;dirtyEditor=true;
      }catch(e){}
    }
    renderPhotoStrip();
    ev.target.value='';
  };

  // 입력 시 자동 임시저장(디바운스)
  let saveTimer=null;
  ['titleInput','textArea'].forEach(id=>{
    document.getElementById(id).addEventListener('input',()=>{
      dirtyEditor=true;
      clearTimeout(saveTimer);saveTimer=setTimeout(saveDraftNow,500);
    });
  });

  const bar=document.createElement('button');bar.className='save-bar';bar.textContent='SAVE';
  app.appendChild(bar);
  bar.onclick=()=>{
    const title=document.getElementById('titleInput').value.trim();
    const text=document.getElementById('textArea').value.trim();
    if(!title&&!text){showToast('내용을 입력해 주세요');return;}
    const list=loadEntries(s.userId);
    if(state.editingEntry){
      const idx=list.findIndex(e=>e.id===state.editingEntry.id);
      if(idx>-1){
        list[idx]={...list[idx],kind,title,text,photos:kind==='memo'?photos:[],loc:kind==='diary'?(loc||list[idx].loc||null):null};
      }
    } else {
      const ts=Date.now();
      list.push({id:'e'+ts+Math.random().toString(36).slice(2,6),kind,title,text,createdAt:ts,
        loc:kind==='diary'?(loc||null):null, photos:photos.slice(), pinned:false});
      state.selDayKey=dayKey(ts);
    }
    saveEntries(s.userId,list);
    dirtyEditor=false;clearDraft(s.userId);
    state.editingEntry=null;state.tab=(kind==='memo')?'memo':state.tab;
    state.screen='main';render();
    showToast('저장했어요');
  };
}

      <div class="entry-date serif">${fmtFull(e.createdAt)}</div>
      <div class="detail-text serif">${esc(e.text||'')}</div>
      ${e.photos&&e.photos.length?`<div class="detail-photos">${e.photos.map(p=>`<img src="${p}">`).join('')}</div>`:''}
      ${e.loc?`<div class="map-frame"><iframe loading="lazy" src="https://maps.google.com/maps?q=${e.loc.lat},${e.loc.lng}&z=15&output=embed"></iframe></div>
        <div class="addr-line">◦ 위도 ${e.loc.lat.toFixed(5)}, 경도 ${e.loc.lng.toFixed(5)}</div>`:''}
    </div>`;
  document.getElementById('back').onclick=()=>{state.screen='main';render();};
  document.getElementById('editBtn').onclick=()=>{
    // state.editingEntry는 이미 설정되어 있음 (수정 모드로 renderEditor가 인식)
    state.screen='editor';render();
  };
  if(isMemo){
    document.getElementById('pinBtn').onclick=()=>{
      const list=loadEntries(s.userId);
      const idx=list.findIndex(x=>x.id===e.id);
      if(idx>-1){list[idx].pinned=!list[idx].pinned;saveEntries(s.userId,list);e.pinned=list[idx].pinned;render();}
    };
  }
  document.getElementById('del').onclick=()=>{
    showConfirmModal('삭제할까요?','이 글을 삭제하면 되돌릴 수 없습니다.',()=>{
      saveEntries(s.userId,loadEntries(s.userId).filter(x=>x.id!==e.id));state.screen='main';render();
    });
  };
}

/* =========================================================
   일정 추가/수정
   ========================================================= */
function renderSchedEditor(){
  const s=getSession();
  const sc=state.editingSched;
  const baseDate=sc?new Date(sc.date):new Date(state.selDayKey.split('-').map(Number).reduce((a,v,i)=>i===0?new Date(v,0,1):a,null)||Date.now());
  const initDateObj = sc? new Date(sc.date) : (()=>{const [y,m,d]=state.selDayKey.split('-').map(Number);return new Date(y,m,d);})();
  const dateStr = `${initDateObj.getFullYear()}-${String(initDateObj.getMonth()+1).padStart(2,'0')}-${String(initDateObj.getDate()).padStart(2,'0')}`;
  let repeat = sc? (sc.repeat||'none') : 'none';
  let allDay = sc? !!sc.allDay : true;

  app.innerHTML=`<div class="topbar"><div class="back-row"><button class="icon-btn" id="back">‹</button></div>
      <span class="center-title serif">일정</span></div>
    <div class="editor-screen">
      <input class="title-input serif" id="sTitle" placeholder="일정 제목" value="${esc(sc?sc.title:'')}">
      <div class="form-row"><label>날짜</label><input type="date" id="sDate" value="${dateStr}"></div>
      <div class="form-row"><label>하루 종일 / 시간 지정</label>
        <div class="chip-row"><span class="chip ${allDay?'active':''}" data-v="1" id="chipAllday">하루 종일</span><span class="chip ${!allDay?'active':''}" data-v="0" id="chipTime">시간 지정</span></div>
      </div>
      <div class="form-row" id="timeRow" style="display:${allDay?'none':'block'}"><label>시간</label>
        <input type="time" id="sTime" value="${sc?String(sc.hour||9).padStart(2,'0')+':'+String(sc.minute||0).padStart(2,'0'):'09:00'}"></div>
      <div class="form-row"><label>반복</label>
        <div class="chip-row">
          <span class="chip rchip ${repeat==='none'?'active':''}" data-v="none">반복 안함</span>
          <span class="chip rchip ${repeat==='weekly'?'active':''}" data-v="weekly">매주</span>
          <span class="chip rchip ${repeat==='monthly'?'active':''}" data-v="monthly">매월</span>
          <span class="chip rchip ${repeat==='yearly'?'active':''}" data-v="yearly">매년</span>
        </div>
      </div>
      <div class="form-row"><label>음력 보기</label>
        <div id="lunarPreview" class="addr-line">◦ ${lunarLabel(initDateObj)}</div>
      </div>
    </div>`;
  document.getElementById('back').onclick=()=>{state.screen='main';render();};
  document.getElementById('chipAllday').onclick=()=>{allDay=true;document.getElementById('chipAllday').classList.add('active');document.getElementById('chipTime').classList.remove('active');document.getElementById('timeRow').style.display='none';};
  document.getElementById('chipTime').onclick=()=>{allDay=false;document.getElementById('chipTime').classList.add('active');document.getElementById('chipAllday').classList.remove('active');document.getElementById('timeRow').style.display='block';};
  document.querySelectorAll('.rchip').forEach(c=>c.onclick=()=>{document.querySelectorAll('.rchip').forEach(x=>x.classList.remove('active'));c.classList.add('active');repeat=c.dataset.v;});
  document.getElementById('sDate').onchange=(e)=>{
    const [y,m,d]=e.target.value.split('-').map(Number);
    document.getElementById('lunarPreview').textContent='◦ '+lunarLabel(new Date(y,m-1,d));
  };

  const bar=document.createElement('button');bar.className='save-bar';bar.textContent=sc?'수정 완료':'일정 저장';
  app.appendChild(bar);
  bar.onclick=()=>{
    const title=document.getElementById('sTitle').value.trim();
    if(!title){showToast('일정 제목을 입력해 주세요');return;}
    const dv=document.getElementById('sDate').value;
    const [y,m,d]=dv.split('-').map(Number);
    let hour=9,minute=0;
    if(!allDay){const tv=document.getElementById('sTime').value||'09:00';[hour,minute]=tv.split(':').map(Number);}
    const dateTs=new Date(y,m-1,d).getTime();
    const list=loadSched(s.userId);
    if(sc){
      const idx=list.findIndex(x=>x.id===sc.id);
      if(idx>-1)list[idx]={...list[idx],title,date:dateTs,allDay,hour,minute,repeat};
    } else {
      list.push({id:'s'+Date.now()+Math.random().toString(36).slice(2,6),title,date:dateTs,allDay,hour,minute,repeat,createdAt:Date.now()});
    }
    saveSched(s.userId,list);
    state.selDayKey=dayKeyYMD(y,m-1,d);
    state.editingSched=null;state.screen='main';render();
    showToast('일정을 저장했어요');
  };

  if(sc){
    const delBtn=document.createElement('button');
    delBtn.textContent='일정 삭제';
    delBtn.style="position:fixed;bottom:88px;left:50%;transform:translateX(-50%);width:calc(100% - 52px);max-width:408px;background:none;border:1px solid #c0392b;color:#c0392b;padding:12px;font-size:13px;cursor:pointer;z-index:30;font-family:inherit;";
    app.appendChild(delBtn);
    delBtn.onclick=()=>{
      showConfirmModal('일정을 삭제할까요?','삭제하면 되돌릴 수 없습니다.',()=>{
        saveSched(s.userId,loadSched(s.userId).filter(x=>x.id!==sc.id));
        state.editingSched=null;state.screen='main';render();
      });
    };
  }
}

/* =========================================================
   설정
   ========================================================= */
function renderSettings(){
  const s=getSession();
  const savedEmail=(()=>{try{return JSON.parse(localStorage.getItem('somEmail_'+s.userId))||'';}catch(e){return'';}})();
  app.innerHTML=`<div class="topbar"><div class="back-row"><button class="icon-btn" id="back">‹</button></div>
      <span class="center-title serif">Settings</span></div>
    <div class="settings-screen">
      <div class="set-group"><h3>ACCOUNT</h3>
        <div class="set-item"><div class="lbl serif">${esc(s.userId)}님으로 사용 중</div>
          <div class="dsc">이 폰 안에서만 저장되며, 다른 사람의 글은 보이지 않습니다.</div>
          <button class="act" id="logout" style="margin-top:14px;">로그아웃</button></div>
        <div class="set-item"><div class="toggle-row"><div>
            <div class="lbl serif">로그인 유지</div>
            <div class="dsc">켜두면 앱을 다시 열 때 비번 없이 바로 들어가요. 끄면 매번 비밀번호를 입력합니다 (아이디는 항상 기억돼요).</div>
          </div><label class="toggle"><input type="checkbox" id="autoLoginToggle" ${getAutoLogin()?'checked':''}><span class="slider"></span></label></div></div>
      </div>
      <div class="set-group"><h3>백업 · 폰 옮기기</h3>
        <div class="set-item"><div class="lbl serif">① 백업 파일 저장 (복원용)</div>
          <div class="dsc">모든 일기·메모·일정·사진을 하나의 백업 파일로 내려받습니다. 폰을 바꾸거나 데이터가 사라져도 이 파일로 그대로 되살릴 수 있어요.</div>
          <button class="act solid" id="exportJson">백업 파일 저장하기</button></div>
        <div class="set-item"><div class="lbl serif">② 백업 파일 불러오기 (복원)</div>
          <div class="dsc">①에서 저장한 백업 파일을 선택하면 지금 계정으로 모두 복원됩니다. (중복되지 않게 합쳐져요)</div>
          <input type="file" id="importFile" accept=".json,application/json" style="display:none">
          <button class="act" id="importBtn">백업 파일 불러오기</button></div>
        <div class="set-item"><div class="lbl serif">메일로 백업 보내기</div>
          <div class="dsc">받을 이메일을 적어두면 버튼이 메일 앱을 엽니다. ①에서 저장한 파일을 첨부해 보내두면 가장 안전해요.</div>
          <input id="bmail" type="email" placeholder="example@email.com" value="${esc(savedEmail)}">
          <button class="act" id="backup" style="margin-top:10px;">메일 앱 열기 (읽기용 사본 첨부)</button></div></div>
      <div class="set-group"><h3>SHARE</h3>
        <div class="set-item"><div class="lbl serif">지인에게 전달</div>
          <div class="dsc">링크를 카카오톡으로 보내면, 상대가 "홈 화면에 추가"로 폰에 설치할 수 있어요. 상대는 본인 계정을 새로 만들어 사용합니다.</div>
          <button class="act" id="share">공유하기</button></div></div>
    </div>`;
  document.getElementById('back').onclick=()=>{state.screen='main';render();};
  document.getElementById('logout').onclick=()=>{
    clearSession();setAutoLogin(false);
    localStorage.removeItem('somPersistSession');
    state.screen='lock';render();
  };
  document.getElementById('autoLoginToggle').onchange=(e)=>{
    setAutoLogin(e.target.checked);
    if(e.target.checked){
      localStorage.setItem(PERSIST_SESSION,JSON.stringify({userId:s.userId}));
    } else {
      localStorage.removeItem(PERSIST_SESSION);
    }
    showToast(e.target.checked?'로그인 유지를 켰어요':'로그인 유지를 껐어요');
  };

  const bm=document.getElementById('bmail');
  bm.onchange=()=>{localStorage.setItem('somEmail_'+s.userId,JSON.stringify(bm.value.trim()));showToast('이메일이 저장되었습니다');};

  document.getElementById('exportJson').onclick=()=>{
    const entries=loadEntries(s.userId);
    const scheds=loadSched(s.userId);
    if(!entries.length&&!scheds.length){showToast('백업할 내용이 없습니다');return;}
    const pack={app:'SOMSOM',version:2,userId:s.userId,exportedAt:Date.now(),entries,scheds};
    const blob=new Blob([JSON.stringify(pack)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=`SOMSOM_백업_${s.userId}_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('백업 파일을 저장했어요. 메일로도 보내두면 안전해요');
  };
  document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
  document.getElementById('importFile').onchange=(ev)=>{
    const file=ev.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const pack=JSON.parse(reader.result);
        const incomingE=Array.isArray(pack)?pack:(pack.entries||[]);
        const incomingS=pack.scheds||[];
        const curE=loadEntries(s.userId);
        const seenE=new Set(curE.map(e=>e.id));
        let addedE=0;
        incomingE.forEach(e=>{
          if(e&&e.id&&!seenE.has(e.id)){curE.push(e);seenE.add(e.id);addedE++;}
          else if(e&&!e.id){e.id='e'+Date.now()+Math.random().toString(36).slice(2,6);curE.push(e);addedE++;}
        });
        saveEntries(s.userId,curE);
        const curS=loadSched(s.userId);
        const seenS=new Set(curS.map(x=>x.id));
        let addedS=0;
        incomingS.forEach(x=>{
          if(x&&x.id&&!seenS.has(x.id)){curS.push(x);seenS.add(x.id);addedS++;}
          else if(x&&!x.id){x.id='s'+Date.now()+Math.random().toString(36).slice(2,6);curS.push(x);addedS++;}
        });
        saveSched(s.userId,curS);
        showToast(`복원 완료! 글 ${addedE}개, 일정 ${addedS}개를 가져왔어요`);
      }catch(err){
        showToast('이 파일은 SOMSOM 백업 파일이 아니에요 (.json)');
      }
      ev.target.value='';
    };
    reader.readAsText(file);
  };
  document.getElementById('backup').onclick=()=>{
    const list=loadEntries(s.userId).sort((a,b)=>a.createdAt-b.createdAt);
    if(!list.length){showToast('백업할 글이 없습니다');return;}
    let dump=`SOMSOM · ${s.userId}님의 백업\n생성 ${fmtFull(Date.now())}\n총 ${list.length}개\n\n`;
    list.forEach(e=>{dump+=`----------------------------\n[${e.kind==='memo'?'메모':'일기'}] ${fmtFull(e.createdAt)}\n`;if(firstLine(e.title))dump+=`제목: ${firstLine(e.title)}\n`;if(e.loc)dump+=`위치: ${e.loc.lat.toFixed(5)}, ${e.loc.lng.toFixed(5)} (https://maps.google.com/maps?q=${e.loc.lat},${e.loc.lng})\n`;dump+=`\n${e.text||''}\n\n`;});
    const blob=new Blob([dump],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`SOMSOM_${s.userId}_${new Date().toISOString().slice(0,10)}.txt`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    const email=savedEmail;
    const subj=encodeURIComponent(`[SOMSOM 백업] ${s.userId} ${new Date().toISOString().slice(0,10)}`);
    const body=encodeURIComponent(`방금 내려받은 백업 파일(SOMSOM_로 시작)을 이 메일에 첨부해 보내주세요.\n\n--- 미리보기 ---\n\n`+dump.slice(0,1500));
    setTimeout(()=>{window.location.href=`mailto:${email}?subject=${subj}&body=${body}`;},400);
    showToast('파일을 내려받았어요. 메일 앱에서 첨부해 주세요');
  };
  document.getElementById('share').onclick=async()=>{
    const url=window.location.href;const txt='SOMSOM 다이어리예요. 눌러서 들어간 뒤 "홈 화면에 추가"를 하면 폰에 아이콘이 생겨요.';
    if(navigator.share){try{await navigator.share({title:'SOMSOM',text:txt,url});}catch(e){}}
    else{try{await navigator.clipboard.writeText(txt+'\n'+url);showToast('링크를 복사했어요. 카카오톡에 붙여넣어 보내세요');}catch(e){showToast(url);}}
  };
}

/* =========================================================
   시작
   ========================================================= */
clearSession();
if(navigator.storage&&navigator.storage.persist){navigator.storage.persist().catch(()=>{});}

// 자동로그인 옵션이 켜져 있으면, 마지막 아이디로 자동 입장 (단, 비번은 저장 안 하므로
// "마지막 로그인 사용자"를 그대로 유지하는 방식 — 별도 세션 토큰 사용)
const PERSIST_SESSION='somPersistSession';
function checkAutoLogin(){
  if(getAutoLogin()){
    try{
      const saved=JSON.parse(localStorage.getItem(PERSIST_SESSION));
      if(saved&&saved.userId){
        setSession(saved.userId);
        state.screen='main';
        return;
      }
    }catch(e){}
  }
  state.screen='lock';
}
checkAutoLogin();

// 로그인 성공 시 자동로그인이 켜져있으면 영구세션 저장
const _origSetSession=setSession;
window.__afterLoginHook=()=>{
  if(getAutoLogin()){
    const s=getSession();
    if(s)localStorage.setItem(PERSIST_SESSION,JSON.stringify({userId:s.userId}));
  }
};

render();
if('serviceWorker'in navigator){
  const sw=`
    const CACHE='somsom-v'+(self.registration?self.registration.scope:'1');
    self.addEventListener('install',e=>self.skipWaiting());
    self.addEventListener('activate',e=>self.clients.claim());
    self.addEventListener('fetch',e=>{});
    self.addEventListener('message',e=>{ if(e.data==='check-update') self.registration.update(); });
  `;
  const u=URL.createObjectURL(new Blob([sw],{type:'application/javascript'}));
  navigator.serviceWorker.register(u).then(reg=>{
    reg.update();
    setInterval(()=>reg.update(),60000);
  }).catch(()=>{});
}
</script>
</body>
</html>
