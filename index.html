<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SOMSOM</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiU09NU09NIiwic2hvcnRfbmFtZSI6IlNPTVNPTSIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjZmZmZmZmIiwidGhlbWVfY29sb3IiOiIjZmZmZmZmIiwiaWNvbnMiOltdfQ==">
<style>
  :root{
    --bg:#ffffff; --ink:#2a2a2a; --ink-soft:#9a948c; --ink-faint:#c4beb6;
    --line:#ececec; --accent:#1a1a1a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;min-height:100%;background:var(--bg);color:var(--ink);
    font-family:'Apple SD Gothic Neo','Noto Sans KR',-apple-system,system-ui,sans-serif;
    overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
  .serif{font-family:'Nanum Myeongjo','Noto Serif KR',Georgia,serif;font-weight:400;}
  #app{max-width:460px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:130px;}

  .topbar{position:sticky;top:0;z-index:20;background:var(--bg);
    padding:26px 26px 8px;display:flex;align-items:center;justify-content:space-between;}
  .topbar .title{font-size:21px;letter-spacing:.5px;}
  .topbar .center-title{position:absolute;left:50%;transform:translateX(-50%);font-size:19px;}
  .icon-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    font-size:18px;color:var(--ink-soft);cursor:pointer;background:none;border:none;}
  .icon-btn:active{color:var(--ink);}

  .lock-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:40px 36px;text-align:center;}
  .brand{font-size:34px;letter-spacing:8px;margin-bottom:6px;}
  .brand-sub{font-size:13px;color:var(--ink-soft);letter-spacing:2px;margin-bottom:48px;}
  .field{width:100%;max-width:280px;text-align:left;margin-bottom:20px;}
  .field label{font-size:11px;color:var(--ink-soft);letter-spacing:1px;display:block;margin-bottom:8px;}
  .field input{width:100%;padding:10px 2px;border:none;border-bottom:1px solid var(--line);
    background:transparent;font-size:16px;color:var(--ink);outline:none;font-family:inherit;}
  .field input:focus{border-bottom-color:var(--ink);}
  .lock-msg{font-size:12px;color:#c0392b;height:16px;margin-bottom:6px;}
  .btn-main{width:100%;max-width:280px;padding:14px;margin-top:8px;border:1px solid var(--ink);
    background:var(--ink);color:#fff;font-size:14px;letter-spacing:2px;cursor:pointer;font-family:inherit;}
  .btn-main:active{opacity:.7;}
  .btn-ghost{width:100%;max-width:280px;padding:13px;margin-top:12px;border:none;background:none;
    color:var(--ink-soft);font-size:13px;cursor:pointer;letter-spacing:.5px;font-family:inherit;}
  .hint-users{font-size:11px;color:var(--ink-faint);margin-top:30px;letter-spacing:.5px;}

  /* 달력 */
  .cal-wrap{padding:6px 20px 0;}
  .cal-head{display:flex;align-items:center;justify-content:center;gap:24px;margin:6px 0 18px;}
  .cal-head .mlabel{font-size:18px;letter-spacing:1px;min-width:150px;text-align:center;}
  .cal-nav{background:none;border:none;font-size:20px;color:var(--ink-soft);cursor:pointer;padding:4px 10px;}
  .cal-nav:active{color:var(--ink);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .cal-dow{text-align:center;font-size:11px;color:var(--ink-faint);padding:6px 0;letter-spacing:.5px;}
  .cal-cell{aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;border-radius:50%;position:relative;font-size:14px;color:var(--ink);}
  .cal-cell.empty{cursor:default;}
  .cal-cell.other{color:var(--ink-faint);}
  .cal-cell.today{font-weight:700;}
  .cal-cell.sel{background:var(--ink);color:#fff;}
  .cal-cell.sun{color:#c98b86;}
  .cal-cell.sel.sun{color:#fff;}
  .cal-dot{width:4px;height:4px;border-radius:50%;background:var(--ink);position:absolute;bottom:7px;}
  .cal-cell.sel .cal-dot{background:#fff;}

  .day-divider{height:1px;background:var(--line);margin:20px 26px 6px;}
  .day-label{padding:14px 26px 4px;font-size:13px;color:var(--ink-soft);}

  .entry-row{display:flex;align-items:baseline;justify-content:space-between;
    padding:18px 26px;cursor:pointer;gap:16px;}
  .entry-row:active{background:#fafafa;}
  .entry-row .row-title{font-size:16px;color:var(--ink);flex:1;min-width:0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry-row .row-title.empty{color:var(--ink-faint);}
  .entry-row .row-meta{font-size:11px;color:var(--ink-faint);white-space:nowrap;display:flex;gap:7px;align-items:center;}
  .row-kind{font-size:10px;color:var(--ink-faint);}
  .row-sep{height:1px;background:var(--line);margin:0 26px;}

  .list-head{padding:8px 26px 20px;text-align:center;}
  .list-head .greeting{font-size:13px;color:var(--ink-soft);}
  .list-divider{height:1px;background:var(--line);margin:0 26px 6px;}

  .empty-day{text-align:center;padding:34px 30px;color:var(--ink-faint);font-size:13px;line-height:1.7;}
  .empty-state{text-align:center;padding:80px 30px;color:var(--ink-faint);}
  .empty-state .mk{font-size:30px;margin-bottom:14px;letter-spacing:6px;}
  .empty-state p{font-size:13px;line-height:1.8;margin:0;}

  .editor-screen{padding:8px 26px 30px;}
  .entry-date{font-size:13px;color:var(--ink-soft);margin-bottom:22px;}
  .editor-screen .title-input{width:100%;border:none;outline:none;background:transparent;
    font-size:22px;color:var(--ink);margin-bottom:18px;font-family:inherit;}
  .editor-screen .title-input::placeholder{color:var(--ink-faint);}
  .editor-screen textarea{width:100%;min-height:280px;border:none;outline:none;background:transparent;
    font-size:16px;line-height:1.9;color:var(--ink);resize:none;font-family:inherit;}
  .editor-screen textarea::placeholder{color:var(--ink-faint);}
  .kind-toggle{display:flex;gap:18px;margin-bottom:20px;}
  .kind-toggle button{border:none;background:none;padding:0;font-size:13px;letter-spacing:1px;
    color:var(--ink-faint);cursor:pointer;font-family:inherit;position:relative;}
  .kind-toggle button.active{color:var(--ink);}
  .kind-toggle button.active::after{content:'';position:absolute;left:0;right:0;bottom:-6px;height:1px;background:var(--ink);}
  .loc-note{font-size:12px;color:var(--ink-soft);margin-top:22px;display:flex;align-items:center;gap:6px;}
  .loc-note.active{color:var(--ink);}

  .detail-title{font-size:24px;color:var(--ink);margin:0 0 14px;line-height:1.4;}
  .detail-text{font-size:16px;line-height:1.95;color:var(--ink);white-space:pre-wrap;margin:18px 0;}
  .map-frame{width:100%;height:170px;border-radius:4px;overflow:hidden;margin-top:24px;border:1px solid var(--line);}
  .map-frame iframe{width:100%;height:100%;border:0;}
  .addr-line{font-size:12px;color:var(--ink-soft);margin-top:10px;display:flex;gap:6px;align-items:center;}

  /* 하단 탭바 */
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;
    background:var(--bg);border-top:1px solid var(--line);display:flex;z-index:25;
    padding-bottom:env(safe-area-inset-bottom);}
  .tabbar button{flex:1;background:none;border:none;padding:12px 0 14px;font-size:11px;
    color:var(--ink-faint);cursor:pointer;font-family:inherit;display:flex;flex-direction:column;
    align-items:center;gap:3px;letter-spacing:.5px;}
  .tabbar button .ti{font-size:18px;line-height:1;}
  .tabbar button.active{color:var(--ink);}

  .fab{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);width:54px;height:54px;
    border-radius:50%;background:var(--ink);color:#fff;border:none;font-size:24px;cursor:pointer;
    z-index:30;font-weight:300;display:flex;align-items:center;justify-content:center;line-height:1;
    box-shadow:0 6px 18px rgba(0,0,0,0.18);}
  .fab:active{opacity:.8;}
  .save-bar{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);width:calc(100% - 52px);
    max-width:408px;background:var(--ink);color:#fff;border:none;padding:15px;font-size:14px;
    letter-spacing:2px;cursor:pointer;z-index:30;font-family:inherit;}
  .save-bar:active{opacity:.8;}

  .settings-screen{padding:8px 26px 30px;}
  .set-group{margin-bottom:34px;}
  .set-group h3{font-size:11px;color:var(--ink-soft);letter-spacing:1.5px;margin:0 0 14px;}
  .set-item{padding:4px 0 18px;border-bottom:1px solid var(--line);margin-bottom:18px;}
  .set-item:last-child{border-bottom:none;}
  .set-item .lbl{font-size:15px;margin-bottom:5px;}
  .set-item .dsc{font-size:12.5px;color:var(--ink-soft);line-height:1.65;}
  .set-item input{width:100%;margin-top:12px;padding:9px 2px;border:none;border-bottom:1px solid var(--line);
    font-size:15px;outline:none;background:transparent;font-family:inherit;}
  .set-item input:focus{border-bottom-color:var(--ink);}
  .set-item .act{margin-top:14px;padding:12px;width:100%;border:1px solid var(--ink);background:none;
    color:var(--ink);font-size:13px;letter-spacing:1px;cursor:pointer;font-family:inherit;}
  .set-item .act.solid{background:var(--ink);color:#fff;}
  .set-item .act:active{opacity:.7;}

  .toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:var(--ink);
    color:#fff;padding:11px 22px;border-radius:4px;font-size:13px;z-index:200;opacity:0;
    pointer-events:none;white-space:nowrap;max-width:90%;}
  .toast.show{animation:toastIn 2.4s ease forwards;}
  @keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(8px);}15%{opacity:1;transform:translateX(-50%) translateY(0);}85%{opacity:1;}100%{opacity:0;}}
  .back-row{display:flex;align-items:center;gap:6px;}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
const LS_USERS='somUsers',LS_SESSION='somSession';
const loadUsers=()=>{try{return JSON.parse(localStorage.getItem(LS_USERS))||[];}catch(e){return[];}};
const saveUsers=u=>localStorage.setItem(LS_USERS,JSON.stringify(u));
const eKey=id=>'somEntries_'+id;
const loadEntries=id=>{try{return JSON.parse(localStorage.getItem(eKey(id)))||[];}catch(e){return[];}};
const saveEntries=(id,l)=>localStorage.setItem(eKey(id),JSON.stringify(l));
const simpleHash=s=>{let h=0;for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0;}return'h'+h.toString(36);};
const getSession=()=>{try{return JSON.parse(localStorage.getItem(LS_SESSION));}catch(e){return null;}};
const setSession=id=>localStorage.setItem(LS_SESSION,JSON.stringify({userId:id}));
const clearSession=()=>localStorage.removeItem(LS_SESSION);
const setLastId=id=>localStorage.setItem('somLastId',id);
const getLastId=()=>localStorage.getItem('somLastId')||'';
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.remove('show');void t.offsetWidth;t.classList.add('show');}
const daysEn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const mons=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const dowKr=['일','월','화','수','목','금','토'];
function fmtFull(ts){const d=new Date(ts);let h=d.getHours();const ap=h<12?'AM':'PM';h=h%12||12;return `${daysEn[d.getDay()]}, ${mons[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} ${h}:${String(d.getMinutes()).padStart(2,'0')} ${ap}`;}
function dayKey(ts){const d=new Date(ts);return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}
function timeOnly(ts){const d=new Date(ts);let h=d.getHours();const ap=h<12?'오전':'오후';h=h%12||12;return `${ap} ${h}:${String(d.getMinutes()).padStart(2,'0')}`;}
function firstLine(t){const l=(t||'').trim().split('\n')[0];return l||'';}
const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let state={screen:'lock',tab:'calendar',editingEntry:null,pendingLoc:null,
  calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),selDayKey:dayKey(Date.now())};
const app=document.getElementById('app');

function render(){
  const s=getSession();
  if(!s&&state.screen!=='signup')state.screen='lock';
  ({lock:renderLock,signup:renderSignup,main:renderMain,editor:renderEditor,detail:renderDetail,settings:renderSettings}[state.screen]||renderLock)();
}

function renderLock(){
  const users=loadUsers();
  app.innerHTML=`<div class="lock-screen">
    <div class="brand serif">SOMSOM</div>
    <div class="brand-sub serif">get lost in your story</div>
    <div class="field"><label>ID</label><input id="lid" type="text" placeholder="아이디" autocomplete="off" value="${esc(getLastId())}"></div>
    <div class="field"><label>PASSWORD</label><input id="lpw" type="password" placeholder="비밀번호"></div>
    <div class="lock-msg" id="lmsg"></div>
    <button class="btn-main" id="lbtn">OPEN</button>
    <button class="btn-ghost" id="lsignup">새 계정 만들기</button>
    ${users.length?`<div class="hint-users">이 폰의 계정 · ${users.map(u=>esc(u.id)).join(' / ')}</div>`:''}
  </div>`;
  document.getElementById('lbtn').onclick=()=>{
    const id=document.getElementById('lid').value.trim(),pw=document.getElementById('lpw').value,m=document.getElementById('lmsg');
    if(!id||!pw){m.textContent='아이디와 비밀번호를 입력해 주세요.';return;}
    const u=users.find(x=>x.id===id);
    if(!u){m.textContent='등록되지 않은 아이디입니다.';return;}
    if(u.pwHash!==simpleHash(pw)){m.textContent='비밀번호가 올바르지 않습니다.';return;}
    setLastId(id);setSession(id);state.screen='main';render();
  };
  document.getElementById('lsignup').onclick=()=>{state.screen='signup';render();};
  if(getLastId()){const pwEl=document.getElementById('lpw');if(pwEl)pwEl.focus();}
}

function renderSignup(){
  app.innerHTML=`<div class="lock-screen">
    <div class="brand serif">SOMSOM</div>
    <div class="brand-sub serif">새 계정 만들기</div>
    <div class="field"><label>ID</label><input id="sid" type="text" placeholder="예: somsom, mom"></div>
    <div class="field"><label>PASSWORD</label><input id="spw" type="password" placeholder="비밀번호"></div>
    <div class="field"><label>PASSWORD 확인</label><input id="spw2" type="password" placeholder="다시 입력"></div>
    <div class="lock-msg" id="smsg"></div>
    <button class="btn-main" id="sbtn">START</button>
    <button class="btn-ghost" id="sback">이미 계정이 있어요</button>
  </div>`;
  document.getElementById('sbtn').onclick=()=>{
    const id=document.getElementById('sid').value.trim(),pw=document.getElementById('spw').value,pw2=document.getElementById('spw2').value,m=document.getElementById('smsg');
    const users=loadUsers();
    if(!id||!pw){m.textContent='아이디와 비밀번호를 입력해 주세요.';return;}
    if(users.find(u=>u.id===id)){m.textContent='이미 사용 중인 아이디입니다.';return;}
    if(pw!==pw2){m.textContent='비밀번호가 서로 다릅니다.';return;}
    users.push({id,pwHash:simpleHash(pw),createdAt:Date.now()});saveUsers(users);
    setLastId(id);setSession(id);state.screen='main';render();
  };
  document.getElementById('sback').onclick=()=>{state.screen='lock';render();};
}

function renderMain(){
  const s=getSession();
  app.innerHTML=`<div class="topbar">
      <span class="title serif">${state.tab==='calendar'?'Calendar':'Diary'}</span>
      <button class="icon-btn" id="setBtn" style="margin-left:auto;">≡</button>
    </div><div id="mainBody"></div>`;
  if(state.tab==='calendar')renderCalendar();else renderListAll();
  document.getElementById('setBtn').onclick=()=>{state.screen='settings';render();};
  // 탭바
  const tb=document.createElement('div');tb.className='tabbar';
  tb.innerHTML=`
    <button data-t="calendar" class="${state.tab==='calendar'?'active':''}"><span class="ti">▦</span>달력</button>
    <button data-t="list" class="${state.tab==='list'?'active':''}"><span class="ti">≣</span>모아보기</button>`;
  app.appendChild(tb);
  tb.querySelectorAll('button').forEach(b=>b.onclick=()=>{state.tab=b.dataset.t;render();});
  const fab=document.createElement('button');fab.className='fab';fab.textContent='+';
  app.appendChild(fab);
  fab.onclick=()=>{state.editingEntry=null;state.pendingLoc=null;state.screen='editor';render();};
}

function renderCalendar(){
  const s=getSession();
  const entries=loadEntries(s.userId);
  const counts={};entries.forEach(e=>{const k=dayKey(e.createdAt);counts[k]=(counts[k]||0)+1;});
  const y=state.calYear,m=state.calMonth;
  const first=new Date(y,m,1);const startDow=first.getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayK=dayKey(Date.now());
  let cells='';
  for(let i=0;i<startDow;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const k=`${y}-${m}-${d}`;const dow=new Date(y,m,d).getDay();
    const cls=['cal-cell'];
    if(dow===0)cls.push('sun');
    if(k===todayK)cls.push('today');
    if(k===state.selDayKey)cls.push('sel');
    cells+=`<div class="${cls.join(' ')}" data-k="${k}" data-d="${d}">${d}${counts[k]?'<span class="cal-dot"></span>':''}</div>`;
  }
  const body=document.getElementById('mainBody');
  body.innerHTML=`<div class="cal-wrap">
    <div class="cal-head">
      <button class="cal-nav" id="prevM">‹</button>
      <span class="mlabel serif">${y}년 ${m+1}월</span>
      <button class="cal-nav" id="nextM">›</button>
    </div>
    <div class="cal-grid">${dowKr.map((d,i)=>`<div class="cal-dow" style="${i===0?'color:#c98b86':''}">${d}</div>`).join('')}${cells}</div>
  </div>
  <div class="day-divider"></div>
  <div id="dayEntries"></div>`;
  document.getElementById('prevM').onclick=()=>{state.calMonth--;if(state.calMonth<0){state.calMonth=11;state.calYear--;}renderCalendar();};
  document.getElementById('nextM').onclick=()=>{state.calMonth++;if(state.calMonth>11){state.calMonth=0;state.calYear++;}renderCalendar();};
  body.querySelectorAll('.cal-cell[data-k]').forEach(c=>c.onclick=()=>{state.selDayKey=c.dataset.k;renderCalendar();});
  renderDayEntries();
}

function renderDayEntries(){
  const s=getSession();
  const wrap=document.getElementById('dayEntries');if(!wrap)return;
  const list=loadEntries(s.userId).filter(e=>dayKey(e.createdAt)===state.selDayKey).sort((a,b)=>b.createdAt-a.createdAt);
  const [yy,mm,dd]=state.selDayKey.split('-').map(Number);
  const lbl=`${mm+1}월 ${dd}일 (${dowKr[new Date(yy,mm,dd).getDay()]})`;
  if(!list.length){
    wrap.innerHTML=`<div class="day-label serif">${lbl}</div><div class="empty-day">이 날의 기록이 없어요.<br>아래 + 로 글을 남겨보세요.</div>`;
    return;
  }
  wrap.innerHTML=`<div class="day-label serif">${lbl}</div>`+list.map((e,i)=>{
    const t=firstLine(e.title)||firstLine(e.text);
    return `<div class="entry-row" data-id="${e.id}">
      <span class="row-title ${t?'':'empty'} serif">${t?esc(t):'(제목 없음)'}</span>
      <span class="row-meta"><span class="row-kind">${e.kind==='memo'?'메모':'일기'}</span>${timeOnly(e.createdAt)}</span>
    </div>${i<list.length-1?'<div class="row-sep"></div>':''}`;
  }).join('');
  wrap.querySelectorAll('.entry-row').forEach(r=>r.onclick=()=>{state.editingEntry=list.find(e=>e.id===r.dataset.id);state.screen='detail';render();});
}

function renderListAll(){
  const s=getSession();
  const entries=loadEntries(s.userId).sort((a,b)=>b.createdAt-a.createdAt);
  const body=document.getElementById('mainBody');
  if(!entries.length){
    body.innerHTML=`<div class="list-head"><div class="greeting serif">오늘도 잘 지냈어요, ${esc(s.userId)}님</div></div>
      <div class="empty-state"><div class="mk serif">SOMSOM</div><p>아직 적은 이야기가 없어요.<br>아래 + 를 눌러 첫 글을 남겨보세요.</p></div>`;
    return;
  }
  body.innerHTML=`<div class="list-head"><div class="greeting serif">${entries.length}개의 이야기</div></div><div class="list-divider"></div>`+
    entries.map((e,i)=>{
      const t=firstLine(e.title)||firstLine(e.text);
      const d=new Date(e.createdAt);
      return `<div class="entry-row" data-id="${e.id}">
        <span class="row-title ${t?'':'empty'} serif">${t?esc(t):'(제목 없음)'}</span>
        <span class="row-meta">${d.getMonth()+1}/${d.getDate()}</span>
      </div>${i<entries.length-1?'<div class="row-sep"></div>':''}`;
    }).join('');
  body.querySelectorAll('.entry-row').forEach(r=>r.onclick=()=>{state.editingEntry=entries.find(e=>e.id===r.dataset.id);state.screen='detail';render();});
}

function renderEditor(){
  const s=getSession();let kind='diary';let loc=state.pendingLoc;let locStatus=loc?'ok':'idle';
  app.innerHTML=`<div class="topbar"><div class="back-row"><button class="icon-btn" id="back">‹</button></div></div>
    <div class="editor-screen">
      <div class="entry-date serif">${fmtFull(Date.now())}</div>
      <div class="kind-toggle"><button data-k="diary" class="active serif">일기</button><button data-k="memo" class="serif">메모</button></div>
      <input class="title-input serif" id="titleInput" placeholder="제목">
      <textarea id="textArea" placeholder="당신의 이야기를 들려주세요..."></textarea>
      <div class="loc-note" id="locNote">위치 정보를 가져오는 중…</div>
    </div>`;
  document.getElementById('back').onclick=()=>{state.screen='main';render();};
  document.querySelectorAll('.kind-toggle button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.kind-toggle button').forEach(x=>x.classList.remove('active'));b.classList.add('active');kind=b.dataset.k;});
  const note=document.getElementById('locNote');
  const upd=()=>{
    if(locStatus==='ok'&&loc){note.classList.add('active');note.textContent=`◦ 이 위치가 함께 기록됩니다 (${loc.lat.toFixed(4)}, ${loc.lng.toFixed(4)})`;}
    else if(locStatus==='denied'){note.classList.remove('active');note.textContent='◦ 위치 없이 저장됩니다 (https 주소에서 열면 자동 기록됩니다)';}
    else{note.classList.remove('active');note.textContent='위치 정보를 가져오는 중…';}
  };
  upd();
  if(!loc){
    if('geolocation'in navigator&&(location.protocol==='https:'||location.hostname==='localhost')){
      navigator.geolocation.getCurrentPosition(
        p=>{loc={lat:p.coords.latitude,lng:p.coords.longitude};state.pendingLoc=loc;locStatus='ok';upd();},
        ()=>{locStatus='denied';upd();},{timeout:8000});
    }else{locStatus='denied';upd();}
  }
  const bar=document.createElement('button');bar.className='save-bar';bar.textContent='SAVE';
  app.appendChild(bar);
  bar.onclick=()=>{
    const title=document.getElementById('titleInput').value.trim();
    const text=document.getElementById('textArea').value.trim();
    if(!title&&!text){showToast('내용을 입력해 주세요');return;}
    const list=loadEntries(s.userId);
    const ts=Date.now();
    list.push({id:'e'+ts+Math.random().toString(36).slice(2,6),kind,title,text,createdAt:ts,loc:loc||null});
    saveEntries(s.userId,list);
    state.selDayKey=dayKey(ts);
    state.screen='main';render();
  };
}

function renderDetail(){
  const s=getSession();const e=state.editingEntry;
  app.innerHTML=`<div class="topbar"><div class="back-row"><button class="icon-btn" id="back">‹</button></div>
      <button class="icon-btn" id="del" style="margin-left:auto;">⌫</button></div>
    <div class="editor-screen">
      ${firstLine(e.title)?`<h2 class="detail-title serif">${esc(firstLine(e.title))}</h2>`:''}
      <div class="entry-date serif">${fmtFull(e.createdAt)}</div>
      <div class="detail-text serif">${esc(e.text||'')}</div>
      ${e.loc?`<div class="map-frame"><iframe loading="lazy" src="https://maps.google.com/maps?q=${e.loc.lat},${e.loc.lng}&z=15&output=embed"></iframe></div>
        <div class="addr-line">◦ 위도 ${e.loc.lat.toFixed(5)}, 경도 ${e.loc.lng.toFixed(5)}</div>`:''}
    </div>`;
  document.getElementById('back').onclick=()=>{state.screen='main';render();};
  document.getElementById('del').onclick=()=>{
    if(confirm('이 글을 삭제할까요? 되돌릴 수 없습니다.')){
      saveEntries(s.userId,loadEntries(s.userId).filter(x=>x.id!==e.id));state.screen='main';render();}
  };
}

function renderSettings(){
  const s=getSession();
  const savedEmail=(()=>{try{return JSON.parse(localStorage.getItem('somEmail_'+s.userId))||'';}catch(e){return'';}})();
  app.innerHTML=`<div class="topbar"><div class="back-row"><button class="icon-btn" id="back">‹</button></div>
      <span class="center-title serif">Settings</span></div>
    <div class="settings-screen">
      <div class="set-group"><h3>ACCOUNT</h3>
        <div class="set-item"><div class="lbl serif">${esc(s.userId)}님으로 사용 중</div>
          <div class="dsc">이 폰 안에서만 저장되며, 다른 사람의 글은 보이지 않습니다.</div>
          <button class="act" id="logout">로그아웃</button></div></div>
      <div class="set-group"><h3>BACKUP</h3>
        <div class="set-item"><div class="lbl serif">백업 받을 이메일</div>
          <div class="dsc">입력해두면 백업할 때 메일 앱이 이 주소로 미리 채워집니다.</div>
          <input id="bmail" type="email" placeholder="example@email.com" value="${esc(savedEmail)}"></div>
        <div class="set-item"><div class="lbl serif">백업 파일 보내기</div>
          <div class="dsc">내 글을 모두 하나의 파일로 내려받고, 메일 앱을 엽니다. 받은 파일을 첨부해 보내주세요.</div>
          <button class="act solid" id="backup">백업 메일 준비</button></div></div>
      <div class="set-group"><h3>SHARE</h3>
        <div class="set-item"><div class="lbl serif">지인에게 전달</div>
          <div class="dsc">링크를 카카오톡으로 보내면, 상대가 "홈 화면에 추가"로 폰에 설치할 수 있어요. 상대는 본인 계정을 새로 만들어 사용합니다.</div>
          <button class="act" id="share">공유하기</button></div></div>
    </div>`;
  document.getElementById('back').onclick=()=>{state.screen='main';render();};
  document.getElementById('logout').onclick=()=>{clearSession();state.screen='lock';render();};
  const bm=document.getElementById('bmail');
  bm.onchange=()=>{localStorage.setItem('somEmail_'+s.userId,JSON.stringify(bm.value.trim()));showToast('이메일이 저장되었습니다');};
  document.getElementById('backup').onclick=()=>{
    const list=loadEntries(s.userId).sort((a,b)=>a.createdAt-b.createdAt);
    if(!list.length){showToast('백업할 글이 없습니다');return;}
    let dump=`SOMSOM · ${s.userId}님의 백업\n생성 ${fmtFull(Date.now())}\n총 ${list.length}개\n\n`;
    list.forEach(e=>{dump+=`----------------------------\n[${e.kind==='memo'?'메모':'일기'}] ${fmtFull(e.createdAt)}\n`;if(firstLine(e.title))dump+=`제목: ${firstLine(e.title)}\n`;if(e.loc)dump+=`위치: ${e.loc.lat.toFixed(5)}, ${e.loc.lng.toFixed(5)} (https://maps.google.com/maps?q=${e.loc.lat},${e.loc.lng})\n`;dump+=`\n${e.text||''}\n\n`;});
    const blob=new Blob([dump],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`SOMSOM_${s.userId}_${new Date().toISOString().slice(0,10)}.txt`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    const email=savedEmail;
    const subj=encodeURIComponent(`[SOMSOM 백업] ${s.userId} ${new Date().toISOString().slice(0,10)}`);
    const body=encodeURIComponent(`방금 내려받은 백업 파일(SOMSOM_로 시작)을 이 메일에 첨부해 보내주세요.\n\n--- 미리보기 ---\n\n`+dump.slice(0,1500));
    setTimeout(()=>{window.location.href=`mailto:${email}?subject=${subj}&body=${body}`;},400);
    showToast('파일을 내려받았어요. 메일 앱에서 첨부해 주세요');
  };
  document.getElementById('share').onclick=async()=>{
    const url=window.location.href;const txt='SOMSOM 다이어리예요. 눌러서 들어간 뒤 "홈 화면에 추가"를 하면 폰에 아이콘이 생겨요.';
    if(navigator.share){try{await navigator.share({title:'SOMSOM',text:txt,url});}catch(e){}}
    else{try{await navigator.clipboard.writeText(txt+'\n'+url);showToast('링크를 복사했어요. 카카오톡에 붙여넣어 보내세요');}catch(e){showToast(url);}}
  };
}

clearSession();
render();
if('serviceWorker'in navigator){
  const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());self.addEventListener('fetch',e=>{});`;
  const u=URL.createObjectURL(new Blob([sw],{type:'application/javascript'}));
  navigator.serviceWorker.register(u).catch(()=>{});
}
</script>
</body>
</html>
